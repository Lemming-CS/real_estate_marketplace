name: electronics_marketplace_mobile
description: Flutter mobile client for the real-estate marketplace assignment.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.1.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_map: ^7.0.2
  file_selector: ^1.0.3
  go_router: ^14.2.7
  http: ^1.2.2
  http_parser: ^4.1.2
  image_picker: ^1.1.2
  intl: any
  latlong2: ^0.9.1
  mime: ^1.0.6
  open_filex: ^4.5.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
