services:
  mysql:
    image: mysql:8.4
    container_name: marketplace-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketplace-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_NAME: Real Estate Marketplace API
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_LOG_LEVEL: INFO
      APP_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MEDIA_STORAGE_PATH: /app/uploads
      MOCK_PAYMENT_CHECKOUT_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      mailhog:
        condition: service_started
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: marketplace-admin
    restart: unless-stopped
    env_file:
      - ./admin/.env
    environment:
      VITE_APP_NAME: Real Estate Marketplace Admin
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    command: npm run dev -- --host 0.0.0.0 --port 5173

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: marketplace-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

volumes:
  mysql_data:
  admin_node_modules:
